<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Employee App</title>

  <link rel="stylesheet" href="./style.css">

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json">

  <meta name="theme-color" content="#000000">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Employees">

</head>

<body>

  <!-- 🔥 SIDEBAR (دست‌نخورده و تمیز) -->
  <div id="sidebar">

    <h3>Menu</h3>

    <a href="#" class="menu-item">📢 Telegram Channel</a>

    <a href="#" class="menu-item">💰 Wallet</a>

    <a href="#" class="menu-item">📄 PDF</a>

    <!-- 🤖 BOT -->
    <a href="https://t.me/ar1_employee_private_bot"
       target="_blank"
       class="menu-bot">
      🤖 ورود به ربات کارمندان
    </a>

  </div>

  <!-- 🔥 MAIN APP -->
  <div id="app">
    Loading...
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <!-- Error Handler -->
  <script>

    window.onerror = function (message, source, lineno, colno, error) {

      document.getElementById("app").innerHTML = `
        <div style="padding:20px;color:white;background:#111;">
          ❌ ${message}
          <br><br>
          ${error && error.stack ? error.stack : ""}
        </div>
      `;

      return true;
    };

    window.addEventListener("unhandledrejection", e => {
      document.getElementById("app").innerHTML = `
        <div style="padding:20px;color:red;background:#111;">
          ❌ ${e.reason}
        </div>
      `;
    });

  </script>

  <!-- APP -->
  <script src="./app.js"></script>

  <!-- SERVICE WORKER -->
  <script>

    if ("serviceWorker" in navigator) {

      window.addEventListener("load", async () => {

        try {

          await navigator.serviceWorker.register("/employee-app/sw.js");

          console.log("✅ Service Worker Ready");

        } catch (err) {

          console.error("❌ Service Worker Failed", err);

        }

      });

    }

  </script>

</body>
</html>
