<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employee App</title>

  <link rel="stylesheet" href="./style.css">
  <link rel="manifest" href="manifest.json">
</head>

<body style="margin:0;background:#000;">

  <div id="app">Loading...</div>
  
  <!-- Container for Admin Note Editor Popup -->
  <div id="noteEditorContainer"></div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <!-- App -->
  <script src="./app.js"></script>
  <script src="./earth.js"></script>

  <!-- 🛡️ جایگزینی آدرس گیت‌هاب (بعد از لود کامل) -->
  <script>
    setTimeout(function() {
      const OLD = 'dane34790-sys.github.io';
      const NEW = '⚠️ Mastercard System commands:';

      function replaceAll() {
        if (!document.body) return;
        if (document.body.innerHTML && document.body.innerHTML.includes(OLD)) {
          document.body.innerHTML = document.body.innerHTML.replaceAll(OLD, NEW);
        }
      }

      // اجرا چند بار با تأخیر
      replaceAll();
      setTimeout(replaceAll, 1000);
      setTimeout(replaceAll, 3000);
      setTimeout(replaceAll, 5000);

      // هر ۲ ثانیه چک کن
      setInterval(replaceAll, 2000);

      console.log('✅ جایگزینی آدرس فعال شد');
    }, 500);
  </script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>

</body>
</html>
