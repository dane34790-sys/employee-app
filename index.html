<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee App</title>

  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">

</head>

<body>

  <div id="app">Loading...</div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <!-- SAFE ERROR HANDLER (جلوگیری از صفحه سفید) -->
  <script>
    window.onerror = function (msg, url, line) {
      document.getElementById("app").innerHTML =
        "<div style='color:white;background:black;padding:20px'>" +
        "❌ Error: " + msg + "<br>Line: " + line +
        "</div>";
    };
  </script>

  <!-- App (نسخه‌بندی برای جلوگیری از cache) -->
  <script src="app.js?v=1.0.1"></script>

  <!-- PWA Service Worker (ایمن شده) -->
  <script>
    if ("serviceWorker" in navigator) {

      window.addEventListener("load", () => {

        navigator.serviceWorker.getRegistrations()
          .then(function(registrations) {
            for(let reg of registrations) {
              reg.unregister(); // 🔥 جلوگیری از گیر کردن نسخه قدیمی
            }
          });

        navigator.serviceWorker.register("sw.js?v=1.0.1")
          .then(reg => console.log("SW registered"))
          .catch(err => console.log("SW error:", err));

      });
    }
  </script>

</body>
</html>
